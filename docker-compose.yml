version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3005:3001"
    environment:
      - PORT=3001
    env_file:
      - ./Backend/.env
    networks:
      - genatlas-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:3001
    depends_on:
      - backend
    networks:
      - genatlas-network

networks:
  genatlas-network:
    driver: bridge
